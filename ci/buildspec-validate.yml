version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - python -m pip install --upgrade pip
      # setuptools >= 70 khong con cai pkg_resources rieng, taskcat can pkg_resources
      - python -m pip install "setuptools==65.5.0"
      - python -m pip install cfn-lint taskcat
  build:
    commands:
      - cfn-lint cloudformation/root.yaml cloudformation/modules/*.yaml pipeline/codepipeline.yaml --ignore-checks W3002
      - taskcat test run

artifacts:
  files:
    - "**/*"
