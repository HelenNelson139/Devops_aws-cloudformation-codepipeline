version: 0.2

phases:
  install:
    commands:
      - python3 -m venv /opt/citools
      - /opt/citools/bin/pip install --upgrade pip
      - /opt/citools/bin/pip install --force-reinstall setuptools wheel
      - /opt/citools/bin/pip install cfn-lint taskcat
      # Verify pkg_resources is accessible before running taskcat
      - /opt/citools/bin/python -c "import pkg_resources; print('pkg_resources OK:', pkg_resources.__version__)"
  build:
    commands:
      - /opt/citools/bin/cfn-lint cloudformation/root.yaml cloudformation/modules/*.yaml pipeline/codepipeline.yaml --ignore-checks W3002
      - /opt/citools/bin/taskcat test run

artifacts:
  files:
    - "**/*"
